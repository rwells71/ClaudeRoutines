name: Daily Morning Digest

on:
  schedule:
    # 5:00 AM Mountain every day.
    # Adjust the hour for your timezone — e.g. use 10 for 5 AM US Eastern (ET = UTC-5).
    - cron: '0 12 * * *'
  workflow_dispatch:   # lets you trigger it manually from the Actions tab to test

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          RECIPIENT_EMAIL:        ${{ secrets.RECIPIENT_EMAIL }}
        run: python gmail_digest.py
